<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! | ITech Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #060b14;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #111b30;
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #1e2d4a;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .icon { font-size: 60px; color: #10b981; margin-bottom: 20px; }
        h1 { margin: 0 0 15px 0; font-size: 32px; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: #2563eb; transform: scale(1.05); }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>¡Mensaje Recibido!</h1>
        <p>Gracias por contactar con <strong>ITech Project</strong>. He recibido tus datos correctamente y me pondré en contacto contigo en las próximas 24-48 horas.</p>
        <!-- Cambia "/" por la URL de tu sitio si no está en la raíz -->
        <a href="index.html" class="btn"><i class="fas fa-home"></i> Volver al inicio</a>
    </div>
</body>

</html>
